# Sandbox Configuration Template
#
# Copy this file to sandbox_config.yaml and fill in your VM details.
#   cp sandbox_config.template.yaml sandbox_config.yaml
#
# Each sandbox needs:
#   - id: unique identifier (used with sandbox_select)
#   - os: "linux" or "windows"
#   - host/port/username: SSH connection details
#   - Either password or key_path for authentication
#
# Optional:
#   - working_dir: default directory for commands
#   - jump: bastion/jump host config for VMs on internal networks

sandboxes:
  - id: "example-linux"
    name: "My Linux VM"
    os: "linux"
    host: "192.168.1.100"
    port: 22
    username: "user"
    password: ""
    key_path: "~/.ssh/id_ed25519"
    working_dir: ""
    connect_timeout: 10
    command_timeout: 60

  # - id: "example-windows"
  #   name: "My Windows VM"
  #   os: "windows"
  #   host: "192.168.1.101"
  #   port: 22
  #   username: "admin"
  #   password: "changeme"
  #   key_path: ""
  #   working_dir: ""
  #   connect_timeout: 10
  #   command_timeout: 60

  # Example with jump host / bastion:
  # - id: "internal-vm"
  #   name: "Internal Network VM"
  #   os: "linux"
  #   host: "10.0.0.50"
  #   port: 22
  #   username: "analyst"
  #   password: ""
  #   key_path: "~/.ssh/my_key"
  #   working_dir: ""
  #   connect_timeout: 10
  #   command_timeout: 60
  #   jump:
  #     host: "bastion.example.com"
  #     port: 22
  #     username: "jump_user"
  #     key_path: "~/.ssh/my_key"

default_sandbox: "example-linux"
